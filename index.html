<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Live Clock</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="clock-card">
            <div id="date" class="date-text">-- --- ----</div>
            <div id="time" class="time-display">00:00:00</div>
            <div class="day-badge">
                <span id="day">-------</span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
